# =============================================================
#  RDP + Tailscale + RustDesk + TradingBot V4
#  Workflow pour repo slh03ninja-cmyk/RDP
#  Hostname: gzl2 | Mot de passe: slh@12345
# =============================================================
name: "\U0001F916 TradingBot V4 \u2014 RDP + Tailscale + Supabase"

on:
  workflow_dispatch:
    inputs:
      # ── Tailscale ──
      ts_tailnet:
        description: "Tailscale tailnet (ex: you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key"
        required: true
      ts_authkey:
        description: "Tailscale Auth key"
        required: true

      # ── Runtime ──
      quick_test:
        description: "Test rapide (5 min)"
        type: boolean
        default: false
      runtime_minutes:
        description: "Dur\u00e9e max en minutes (max 360)"
        required: false
        default: "355"
      cycles:
        description: "0=stop apr\u00e8s A; N=handoffs restants"
        required: false
        default: "0"

      # ── RDP / CRD ──
      rdp_count:
        description: "Instances RDP (1-10)"
        required: false
        default: "1"
      crd_code:
        description: "Chrome Remote Desktop code (optionnel)"
        required: false
        default: ""
      # ── Bot Repo ──
      bot_repo:
        description: "Repo GitHub (ex: user/repo)"
        required: true
        default: ""

      # ── Telegram ──
      tg_api_id:
        description: "Telegram API ID (my.telegram.org)"
        required: true
        default: ""
      tg_api_hash:
        description: "Telegram API Hash"
        required: true
        default: ""
      tg_channels:
        description: "Canaux Telegram s\u00e9par\u00e9s par virgules (ex: @Canal1,@Canal2,@Canal3,@Canal4)"
        required: true
        default: ""
      tg_report_channel:
        description: "Canal de rapport Telegram (alertes + r\u00e9cap)"
        required: false
        default: ""

      # ── MetaTrader 5 ──
      mt5_login:
        description: "MT5 Login (num\u00e9ro de compte)"
        required: true
        default: ""
      mt5_password:
        description: "MT5 Password"
        required: true
        default: ""
      mt5_server:
        description: "MT5 Server (ex: Exness-MT5Real16)"
        required: true
        default: ""

      # ── Trading ──
      lot_total:
        description: "Lot total par signal (ex: 0.02)"
        required: false
        default: "0.02"
      trail_points:
        description: "Trail points XAUUSDm Exness (150 = $1.50)"
        required: false
        default: "150"
      demo_mode:
        description: "Demo Mode \u2014 true=demo, false=live"
        required: false
        default: "true"

      # ── Filtres ──
      news_filter_enabled:
        description: "Filtre News Forex Factory (true/false)"
        required: false
        default: "true"
      news_windows:
        description: "Minutes news s\u00e9par\u00e9es par virgules: avant_bloc,avant_fermeture,apr\u00e8s (ex: 15,5,15)"
        required: false
        default: "15,5,15"

      # ── Supabase / Dashboard ──
      supabase_url:
        description: "Supabase URL (ex: https://xxx.supabase.co)"
        required: false
        default: ""
      supabase_anon_key:
        description: "Supabase Anon Key"
        required: false
        default: ""
      risk_params:
        description: "Limites risque: MAX_POSITIONS,MAX_SPREAD_POINTS (ex: 6,50)"
        required: false
        default: "6,50"

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  # =============================================================
  #  JOB 1 : Setup \u2014 calcul de la matrice
  # =============================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi: ${{ steps.mk.outputs.multi }}
    steps:
      - id: mk
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) { $n = 1 } else {
            $n = [int]"${{ inputs.rdp_count }}"
            if ($n -lt 1) { $n = 1 }
            if ($n -gt 10) { $n = 10 }
          }
          $inc = @()
          for ($i = 1; $i -le $n; $i++) { $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          $multi = if ($n -gt 1) { '1' } else { '0' }
          "multi=$multi" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  # =============================================================
  #  JOB 2 : RDP \u2014 instance Windows + Bot Trading V4
  # =============================================================
  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 370
    env:
      RDP_USER: Gzl
      RDP_PASS: "slh@12345"

    steps:
      # ── CRD Flag ──
      - name: Set CRD flag
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) {
            "CRD_ENABLED=1" | Out-File -Append $env:GITHUB_ENV
          } else {
            "CRD_ENABLED=0" | Out-File -Append $env:GITHUB_ENV
          }

      # ── Chrome Remote Desktop ──
      - name: Install Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $exe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $exe)) {
            $exePath = "$env:TEMP\chromeremotedesktophost.exe"
            try {
              Invoke-WebRequest -Uri "https://dl.google.com/support/remote_assistance/ChromotingHostSetup.exe" -OutFile $exePath -ErrorAction Stop
              Start-Process -FilePath $exePath -ArgumentList "/silent", "/install" -Wait
              Remove-Item $exePath -Force
            } catch {
              $msi = "$env:TEMP\chromeremotedesktophost.msi"
              Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msi -ErrorAction Stop
              Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
              Remove-Item $msi -Force
            }
          }

      - name: Run Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          $pin = "123456".Trim()
          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if ($raw -match '--code\s*=\s*"?([^"\s]+)') {
            $code = ([regex]::Match($raw, '--code\s*=\s*"?([^"\s]+)')).Groups[1].Value
          } elseif ($raw -match '^4/') {
            $code = $raw
          }
          if ($code) {
            Start-Process -FilePath $starter -ArgumentList @(
              "--code="$code"",
              "--redirect-url=""https://remotedesktop.google.com/_/oauthredirect""",
              "--name=""$Env:COMPUTERNAME""",
              "--pin=""$pin"""
            )
          }

      # ── Hostname + Runtime ──
      - name: Decide hostname + runtime
        run: |
          if ("${{ inputs.rdp_count }}" -gt 1) {
            $hn = "gzl2-${{ matrix.id }}"
          } else {
            $hn = "gzl2"
          }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV

          function Yes($v) { "$v" -match '^(?i:true|1|yes|on)$' }
          if ("${{ inputs.runtime_minutes }}" -match '^\d+$') {
            $runtime = [int]"${{ inputs.runtime_minutes }}"
          } else {
            $runtime = 355
          }
          if (Yes("${{ inputs.quick_test }}")) { $runtime = 5 }
          if (-not (Yes("${{ inputs.quick_test }}")) -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      # ── Purge Tailscale ──
      - name: Purge gzl2* devices
        if: needs.setup.outputs.multi == '0'
        run: |
          function Yes($v) { "$v" -match '^(?i:true|1|yes|on)$' }
          if ($true) {
            try {
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
              $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
              $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
              foreach ($d in $list.devices) {
                if ($d.hostname -match '^gzl2[0-9]*$') {
                  Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } -EA SilentlyContinue
                }
              }
              Write-Host "Purge termin\u00e9e."
            } catch {
              Write-Host "Purge warning: $($_.Exception.Message)"
            }
          }

      # ── Tailscale ──
      - name: Install + Up Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i", "`"$dst`"", "/quiet", "/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale IPv4: $ip4"

      # ── RDP User + Firewall (m\u00e9thode robuste) ──
      - name: Enable RDP user + firewall
        run: |
          $u = $env:RDP_USER
          $p = $env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
            Add-LocalGroupMember -Group "Administrators" -Member $u -EA SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -EA SilentlyContinue
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP pr\u00eat. user=$u | ip=$env:TAILSCALE_IP"

      # ── Python ──
      - name: Install Python 3.11
        run: |
          $pyCmd = Get-Command python -ErrorAction SilentlyContinue
          if ($pyCmd) {
            $ver = & python --version 2>&1
            Write-Host "Python d\u00e9j\u00e0 pr\u00e9sent : $ver"
          } else {
            Write-Host "Python non trouv\u00e9 \u2014 installation..."
            $pyUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe"
            $pyInst = "$env:TEMP\python-installer.exe"
            Invoke-WebRequest -Uri $pyUrl -OutFile $pyInst
            Start-Process -FilePath $pyInst -ArgumentList @(
              "/quiet", "InstallAllUsers=1", "PrependPath=1",
              "Include_test=0", "Include_doc=0"
            ) -Wait
            Remove-Item $pyInst -Force
            Write-Host "Python install\u00e9."
          }
          $machinePath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path = "$machinePath;$userPath"
          $pyPaths = @(
            "C:\Python311", "C:\Python311\Scripts",
            "C:\Program Files\Python311", "C:\Program Files\Python311\Scripts",
            "$env:LOCALAPPDATA\Programs\Python\Python311",
            "$env:LOCALAPPDATA\Programs\Python\Python311\Scripts"
          )
          foreach ($p in $pyPaths) {
            if (Test-Path "$p\python.exe") {
              Write-Host "Python trouv\u00e9 dans : $p"
              $current = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
              if ($current -notlike "*$p*") {
                [System.Environment]::SetEnvironmentVariable("Path", "$current;$p;$p\Scripts", "Machine")
                Write-Host "PATH mis \u00e0 jour avec $p"
              }
              $env:Path = "$env:Path;$p;$p\Scripts"
              break
            }
          }
          $ver = & python --version 2>&1
          Write-Host "Version finale : $ver"
          "PYTHON_OK=1" | Out-File -Append $env:GITHUB_ENV

      # ── Python Libs ──
      - name: Install Python libs
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_REPO: ${{ inputs.bot_repo }}
        run: |
          $machinePath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath    = [System.Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path    = "$machinePath;$userPath"
          python -m pip install --upgrade pip -q

          Write-Host "Installation des d\u00e9pendances du bot..."
          python -m pip install telethon MetaTrader5 python-dotenv -q

          $repo     = $env:BOT_REPO
          $headers  = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github.v3.raw"
          }
          $apiBase   = "https://api.github.com/repos/$repo/contents"
          $reqFile   = "$env:TEMP\requirements.txt"
          try {
            Invoke-WebRequest -Uri "$apiBase/requirements.txt" -OutFile $reqFile -Headers $headers -ErrorAction Stop
            Write-Host "requirements.txt t\u00e9l\u00e9charg\u00e9 \u2014 installation des deps dashboard..."
            python -m pip install -r $reqFile -q
          } catch {
            Write-Host "requirements.txt non trouv\u00e9 \u2014 installation des deps dashboard par d\u00e9faut..."
            python -m pip install supabase streamlit plotly pandas streamlit-autorefresh -q
          }
          python -c "import telethon, MetaTrader5, dotenv; print('Bot deps OK')"
          python -c "import supabase; print('Supabase OK')"

      # ── RustDesk ──
      - name: Install RustDesk
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $rdExe)) {
            try {
              $dst = "$env:TEMP\rustdesk.msi"
              Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi" -OutFile $dst
              Start-Process msiexec.exe -ArgumentList "/i", "`"$dst`"", "/quiet", "/norestart" -Wait
              Remove-Item $dst -Force
            } catch {
              winget install --id RustDesk.RustDesk -e --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
            }
          }
          Start-Process -FilePath $rdExe -EA SilentlyContinue
          Start-Sleep -Seconds 5

      # ══════════════════════════════════════════════════════════
      # ── MT5 Exness (FIX: pre-config + auto-login + wait ready)
      # ══════════════════════════════════════════════════════════
      - name: Download + Install MT5 Exness
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_REPO: ${{ inputs.bot_repo }}
          MT5_LOGIN: ${{ inputs.mt5_login }}
          MT5_PASSWORD: ${{ inputs.mt5_password }}
          MT5_SERVER: ${{ inputs.mt5_server }}
        run: |
          # ── 1) T\u00e9l\u00e9charger le zip depuis GitHub Releases ──
          try {
            $zipPath = "$env:TEMP\MT5_Exness.zip"
            $url     = "https://github.com/$env:BOT_REPO/releases/download/v1.0/MT5_Exness.zip"
            $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }

            Write-Host "Telechargement MT5 Exness depuis GitHub Releases..."
            Invoke-WebRequest -Uri $url -OutFile $zipPath -Headers $headers -TimeoutSec 300
            $size = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
            Write-Host "Telecharge : $size MB"

            Write-Host "Extraction vers C:\Program Files ..."
            Expand-Archive -Path $zipPath -DestinationPath "C:\Program Files" -Force
            Remove-Item $zipPath -Force
            Write-Host "MT5 Exness extrait \u2705"
          } catch {
            Write-Error "ERREUR MT5 zip : $($_.Exception.Message)"
          }

          # ── 2) Localiser terminal64.exe ──
          $mt5Dir = "C:\Program Files\MetaTrader 5 EXNESS"
          $mt5Exe = "$mt5Dir\terminal64.exe"
          if (Test-Path $mt5Exe) {
            Write-Host "MT5 trouv\u00e9 : $mt5Exe \u2705"
            "MT5_PATH=$mt5Exe" | Out-File -Append $env:GITHUB_ENV
          } else {
            Write-Host "terminal64.exe non trouv\u00e9 dans $mt5Dir"
            $found = Get-ChildItem "C:\Program Files" -Filter "terminal64.exe" -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $mt5Exe = $found.FullName
              $mt5Dir = $found.DirectoryName
              Write-Host "MT5 trouv\u00e9 par recherche : $mt5Exe"
              "MT5_PATH=$mt5Exe" | Out-File -Append $env:GITHUB_ENV
            } else {
              Write-Error "MT5 non trouv\u00e9 \u2014 impossible de continuer"
              exit 1
            }
          }

          # ════════════════════════════════════════════════════════
          # FIX \u00c9TAPE A : Pr\u00e9-configurer MT5 AVANT le premier lancement
          # ════════════════════════════════════════════════════════

          # 3) Configurer common.ini ET terminal.ini AVANT le lancement
          # ── common.ini (credentials + sections correctes) ──
          $configDirs = @(
            "$mt5Dir\config",
            "$env:APPDATA\MetaQuotes\Terminal\Common\config"
          )
          foreach ($configDir in $configDirs) {
            if (-not (Test-Path $configDir)) {
              New-Item -ItemType Directory -Path $configDir -Force | Out-Null
            }
            $iniLines = @(
              '[Common]',
              "Login=$env:MT5_LOGIN",
              "Password=$env:MT5_PASSWORD",
              "Server=$env:MT5_SERVER",
              'AutoConfiguration=true',
              'EULAAccepted=true',
              '',
              '[Experts]',
              'AllowAlgoTrading=1',
              'AllowLiveTrading=1',
              'Enabled=1'
            )
            $commonIni = $iniLines -join "`n"
            $commonIni | Set-Content -Path "$configDir\common.ini" -Encoding UTF8
            Write-Host "common.ini dans $configDir ✅"
          }

          # ── terminal.ini (AllowAlgoTrading dans le terminal) ──
          $terminalIniPath = "$mt5Dir\config\terminal.ini"
          if (Test-Path $terminalIniPath) {
            Write-Host "terminal.ini existant trouvé — mise à jour..."
            $content = Get-Content $terminalIniPath -Raw -Encoding UTF8
            if ($content -match '\[Experts\]') {
              $content = $content -replace 'AllowAlgoTrading\s*=\s*\d+', 'AllowAlgoTrading=1'
              if ($content -notmatch 'Enabled\s*=\s*\d') {
                $content = $content -replace '(\[Experts\])', "`$1`nEnabled=1"
              }
            } else {
              $content += "`n[Experts]`nAllowAlgoTrading=1`nEnabled=1"
            }
            $content | Set-Content -Path $terminalIniPath -Encoding UTF8
            Write-Host "terminal.ini mis à jour ✅"
          } else {
            Write-Host "terminal.ini non trouvé — création..."
            $termLines = @(
              '[Experts]',
              'AllowAlgoTrading=1',
              'Enabled=1',
              '',
              '[Common]',
              'AllowAlgoTrading=1'
            )
            $termIni = $termLines -join "`n"
            $termIni | Set-Content -Path $terminalIniPath -Encoding UTF8
            Write-Host "terminal.ini créé ✅"
          }

          # ── Aussi dans le dossier AppData du terminal ──
          $appDataTerminal = "$env:APPDATA\MetaQuotes\Terminal"
          if (Test-Path $appDataTerminal) {
            $terminals = Get-ChildItem $appDataTerminal -Directory -ErrorAction SilentlyContinue
            foreach ($tdir in $terminals) {
              $tIni = Join-Path $tdir.FullName "config\terminal.ini"
              if (Test-Path $tIni) {
                $tc = Get-Content $tIni -Raw -Encoding UTF8
                if ($tc -match '\[Experts\]') {
                  $tc = $tc -replace 'AllowAlgoTrading\s*=\s*\d+', 'AllowAlgoTrading=1'
                } else {
                  $tc += "`n[Experts]`nAllowAlgoTrading=1`nEnabled=1"
                }
                $tc | Set-Content -Path $tIni -Encoding UTF8
                Write-Host "terminal.ini AppData mis à jour : $tIni ✅"
              }
            }
          }

          # 4) Raccourci Bureau
          $desktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $wsh = New-Object -ComObject WScript.Shell
          $lnk = $wsh.CreateShortcut("$desktop\MetaTrader 5 EXNESS.lnk")
          $lnk.TargetPath = $mt5Exe
          $lnk.WorkingDirectory = $mt5Dir
          $lnk.Save()
          Write-Host "Raccourci MT5 Bureau cr\u00e9\u00e9 \u2705"

          # ════════════════════════════════════════════════════════
          # FIX \u00c9TAPE B : Lancer MT5 avec auto-login
          # ════════════════════════════════════════════════════════
          Write-Host "D\u00e9marrage MT5 avec auto-login..."
          Start-Process -FilePath $mt5Exe -ArgumentList "/login:$env:MT5_LOGIN /password:$env:MT5_PASSWORD /server:$env:MT5_SERVER" -WorkingDirectory $mt5Dir

          # ════════════════════════════════════════════════════════
          # FIX \u00c9TAPE C : Attendre que MT5 soit VRAIMENT pr\u00eat
          # ════════════════════════════════════════════════════════
          Write-Host "Attente du chargement complet de MT5..."
          $maxWait = 120
          $elapsed = 0
          $ready = $false
          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 5
            $elapsed += 5
            $proc = Get-Process -Name "terminal64" -EA SilentlyContinue
            if ($proc) {
              $mem = [math]::Round($proc.WorkingSet64 / 1MB, 0)
              Write-Host "  MT5 running... ${elapsed}s | RAM=${mem}MB"
              if ($mem -gt 100) {
                Write-Host "MT5 semble charg\u00e9 (RAM > 100MB) \u2705"
                $ready = $true
                break
              }
            } else {
              Write-Host "  MT5 pas encore lanc\u00e9... ${elapsed}s"
            }
          }
          if (-not $ready) {
            Write-Warning "MT5 pourrait ne pas \u00eatre compl\u00e8tement charg\u00e9"
          }
          Start-Sleep -Seconds 10
          Write-Host "MT5 apr\u00e8s attente suppl\u00e9mentaire (10s) \u2705"

          # ════════════════════════════════════════════════════════
          # FIX ÉTAPE D : REDÉMARRER MT5 pour appliquer la config
          # Les fichiers de config sont écrits AVANT le lancement,
          # mais MT5 peut ne pas les charger au premier démarrage.
          # On redémarre pour forcer la prise en compte de AllowAlgoTrading.
          # ════════════════════════════════════════════════════════
          Write-Host "Redémarrage de MT5 pour appliquer la config Algo Trading..."
          Stop-Process -Name "terminal64" -Force -EA SilentlyContinue
          Start-Sleep -Seconds 5
          Start-Process -FilePath $mt5Exe -ArgumentList "/login:$env:MT5_LOGIN /password:$env:MT5_PASSWORD /server:$env:MT5_SERVER" -WorkingDirectory $mt5Dir
          Write-Host "MT5 redémarré — attente 30s..."
          Start-Sleep -Seconds 30
          Write-Host "MT5 après redémarrage ✅"

          # ═══════════════════════════════════════════════════
          # FIX ÉTAPE E : Forcer Algo Trading via registre + attendre
          # ═══════════════════════════════════════════════════

          # 1) Forcer AllowAlgoTrading dans le registre Windows
          Write-Host "Configuration registre MT5 pour Algo Trading..."
          $regPaths = @(
            "HKCU\Software\MetaQuotes\Terminal\Common",
            "HKCU\Software\MetaQuotes\Terminal\Experts"
          )
          foreach ($rp in $regPaths) {
            try {
              New-Item -Path "Registry::$rp" -Force -EA SilentlyContinue | Out-Null
              Set-ItemProperty -Path "Registry::$rp" -Name "AllowAlgoTrading" -Value 1 -EA SilentlyContinue
              Write-Host "  Registre $rp -> AllowAlgoTrading=1"
            } catch {
              Write-Host "  Registre $rp ignoré"
            }
          }
          # Aussi pour le profil utilisateur MetaQuotes
          $mqReg = "HKCU\Software\MetaQuotes"
          try {
            $subkeys = Get-ChildItem "Registry::$mqReg" -EA SilentlyContinue
            foreach ($sk in $subkeys) {
              $expertsPath = "$($sk.PSPath)\Experts"
              New-Item -Path $expertsPath -Force -EA SilentlyContinue | Out-Null
              Set-ItemProperty -Path $expertsPath -Name "AllowAlgoTrading" -Value 1 -EA SilentlyContinue
              Set-ItemProperty -Path $expertsPath -Name "Enabled" -Value 1 -EA SilentlyContinue
              Write-Host "  Registre $($sk.Name)\\Experts -> AllowAlgoTrading=1"
            }
          } catch {
            Write-Host "  Registre MetaQuotes ignoré"
          }

          # 2) Attendre que MT5 ait le trading autorisé (retry 90s)
          # S'assurer que le dossier existe
          $botDir = "C:\TradingBot"
          if (-not (Test-Path $botDir)) {
            New-Item -ItemType Directory -Path $botDir | Out-Null
            Write-Host "Dossier C:\TradingBot créé"
          }

          Write-Host "Attente activation trading (max 90s)..."
          $pyLines = @(
            'import MetaTrader5 as mt5, sys, time',
            'if sys.platform == "win32":',
            '    try: sys.stdout.reconfigure(encoding="utf-8")',
            '    except: pass',
            'if not mt5.initialize():',
            '    print(f"MT5 init failed: {mt5.last_error()}"); sys.exit(1)',
            'for i in range(9):',
            '    t = mt5.terminal_info()',
            '    a = mt5.account_info()',
            '    if t and a:',
            '        ta = getattr(t, "trade_allowed", None)',
            '        td = getattr(t, "tradeapi_disabled", None)',
            '        te = getattr(a, "trade_expert", None)',
            '        print(f"[{(i+1)*10}s] trade_allowed={ta} | tradeapi_disabled={td} | trade_expert={te}")',
            '        if ta and te and not td:',
            '            print("ALGO_OK")',
            '            mt5.shutdown()',
            '            sys.exit(0)',
            '    time.sleep(10)',
            'print("ALGO_FAIL - trading toujours desactive apres 90s")',
            'mt5.shutdown()',
            'sys.exit(1)'
          )
          $diagScript = $pyLines -join "`n"
          $diagScript | Set-Content "C:\TradingBot\diag_algo.py" -Encoding UTF8 -Force
          python "C:\TradingBot\diag_algo.py"
          $diagExit = $LASTEXITCODE
          Remove-Item "C:\TradingBot\diag_algo.py" -Force -EA SilentlyContinue
          if ($diagExit -ne 0) {
            Write-Warning "Algo Trading toujours désactivé — le bot va quand même démarrer (retry dans le code)"
          }

          # ── Aussi t\u00e9l\u00e9charger l'installeur sur le Bureau (fallback) ──
          try {
            $desktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
            $mt5Url  = "https://download.terminal.free/cdn/web/exness.technologies.ltd/mt5/exness5setup.exe"
            $dest    = "$desktop\exness5setup.exe"
            Invoke-WebRequest -Uri $mt5Url -OutFile $dest -TimeoutSec 120 -ErrorAction Stop
            Write-Host "Installeur Exness Bureau \u2705"
          } catch {
            Write-Host "Installeur ignor\u00e9"
          }

      # ══════════════════════════════════════════════════════════
      # ── V\u00e9rifier connexion MT5 AVANT de lancer le bot (FIX)
      # ══════════════════════════════════════════════════════════
      - name: Verify MT5 connection
        if: false  # TEMP: bloqué pour debug
        env:
          MT5_LOGIN: ${{ inputs.mt5_login }}
          MT5_PASSWORD: ${{ inputs.mt5_password }}
          MT5_SERVER: ${{ inputs.mt5_server }}
        run: |
          $botDir = "C:\TradingBot"
          if (-not (Test-Path $botDir)) {
            New-Item -ItemType Directory -Path $botDir | Out-Null
          }
          Write-Host "Test de connexion MT5 via Python..."

          $testScript = @'
          import MetaTrader5 as mt5
          import sys, time

          # Fix encodage Windows (cp1252)
          if sys.platform == "win32":
              try:
                  sys.stdout.reconfigure(encoding="utf-8")
                  sys.stderr.reconfigure(encoding="utf-8")
              except Exception:
                  pass

          login = int("REPLACE_LOGIN")
          pwd   = "REPLACE_PASSWORD"
          srv   = "REPLACE_SERVER"

          print(f"Test connexion: login={login} server={srv}")

          for attempt in range(6):
              print(f"\n--- Tentative {attempt+1}/6 ---")
              if mt5.initialize(login=login, password=pwd, server=srv):
                  info = mt5.account_info()
                  if info and info.login > 0:
                      print(f"\u2705 CONNECT\u00c9: {info.name} | Balance: {info.balance} {info.currency} | Server: {info.server}")
                      mt5.shutdown()
                      sys.exit(0)
                  else:
                      print(f"\u26a0\ufe0f Connect\u00e9 mais pas de compte")
              else:
                  err = mt5.last_error()
                  print(f"\u274c \u00c9chec: {err}")
              mt5.shutdown()
              if attempt < 5:
                  print("Attente 10s...")
                  time.sleep(10)

          print("\n\u274c \u00c9CHEC connexion MT5 apr\u00e8s 6 tentatives")
          sys.exit(1)
          '@
          $testScript = $testScript.Replace("REPLACE_LOGIN", $env:MT5_LOGIN)
          $testScript = $testScript.Replace("REPLACE_PASSWORD", $env:MT5_PASSWORD)
          $testScript = $testScript.Replace("REPLACE_SERVER", $env:MT5_SERVER)
          $testScript | Set-Content "$botDir\test_mt5.py" -Encoding UTF8
          python "$botDir\test_mt5.py"
          $exitCode = $LASTEXITCODE
          Remove-Item "$botDir\test_mt5.py" -Force
          if ($exitCode -ne 0) {
            Write-Warning "\u26a0\ufe0f MT5 pas encore connect\u00e9 \u2014 le bot va r\u00e9essayer avec son propre retry"
            Write-Host "Continuation du workflow..."
          } else {
            Write-Host "\u2705 Connexion MT5 v\u00e9rifi\u00e9e avec succ\u00e8s"
          }

      # ── Setup TradingBot V4 ──
      - name: Setup TradingBot V4
        if: false  # TEMP: bloqué pour debug
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_REPO: ${{ inputs.bot_repo }}
          TG_API_ID: ${{ inputs.tg_api_id }}
          TG_API_HASH: ${{ inputs.tg_api_hash }}
          TG_CHANNELS: ${{ inputs.tg_channels }}
          TG_REPORT_CHANNEL: ${{ inputs.tg_report_channel }}
          MT5_LOGIN: ${{ inputs.mt5_login }}
          MT5_PASSWORD: ${{ inputs.mt5_password }}
          MT5_SERVER: ${{ inputs.mt5_server }}
          LOT_TOTAL: ${{ inputs.lot_total }}
          TRAIL_POINTS: ${{ inputs.trail_points }}
          DEMO_MODE: ${{ inputs.demo_mode }}
          NEWS_FILTER_ENABLED: ${{ inputs.news_filter_enabled }}
          NEWS_WINDOWS: ${{ inputs.news_windows }}
          SUPABASE_URL: ${{ inputs.supabase_url }}
          SUPABASE_ANON_KEY: ${{ inputs.supabase_anon_key }}
          RISK_PARAMS: ${{ inputs.risk_params }}
        run: |
          # ── Cr\u00e9er le dossier ──
          $botDir = "C:\TradingBot"
          if (-not (Test-Path $botDir)) {
            New-Item -ItemType Directory -Path $botDir | Out-Null
          }

          # ── T\u00e9l\u00e9charger le bot V4 depuis GitHub ──
          $repo = $env:BOT_REPO
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github.v3.raw"
          }
          $apiBase = "https://api.github.com/repos/$repo/contents"

          $botFiles = @(
            "telegram_listener.py",
            "signal_parser.py",
            "supabase_logger.py",
            "dashboard.py",
            "requirements.txt"
          )
          foreach ($file in $botFiles) {
            try {
              $url = "$apiBase/$file"
              Invoke-WebRequest -Uri $url -OutFile "$botDir\$file" -Headers $headers -ErrorAction Stop
              Write-Host "$file t\u00e9l\u00e9charg\u00e9 [OK]"
            } catch {
              Write-Warning "Impossible de t\u00e9l\u00e9charger $file : $($_.Exception.Message)"
              if ($file -in @("telegram_listener.py", "signal_parser.py")) {
                Write-Error "FICHIER CRITIQUE MANQUANT: $file \u2014 le bot ne peut pas d\u00e9marrer!"
              }
            }
          }

          # ── Cr\u00e9er le fichier .env ──
          $envFile = "$botDir\.env"

          $channels = $env:TG_CHANNELS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          $ch1 = if ($channels.Count -ge 1) { $channels[0] } else { "" }
          $ch2 = if ($channels.Count -ge 2) { $channels[1] } else { "" }
          $ch3 = if ($channels.Count -ge 3) { $channels[2] } else { "" }
          $ch4 = if ($channels.Count -ge 4) { $channels[3] } else { "" }

          $nw = $env:NEWS_WINDOWS -split ',' | ForEach-Object { $_.Trim() }
          $nwBeforeBlock  = if ($nw.Count -ge 1) { $nw[0] } else { "15" }
          $nwBeforeClose  = if ($nw.Count -ge 2) { $nw[1] } else { "5" }
          $nwAfter        = if ($nw.Count -ge 3) { $nw[2] } else { "15" }

          $rp = $env:RISK_PARAMS -split ',' | ForEach-Object { $_.Trim() }
          $maxPositions   = if ($rp.Count -ge 1 -and $rp[0] -match '^\d+$') { $rp[0] } else { "6" }
          $maxSpread      = if ($rp.Count -ge 2 -and $rp[1] -match '^\d+$') { $rp[1] } else { "50" }

          $lines = @(
            "TG_API_ID=$env:TG_API_ID",
            "TG_API_HASH=$env:TG_API_HASH",
            "TG_CHANNEL=$ch1",
            "TG_CHANNEL_2=$ch2",
            "TG_CHANNEL_3=$ch3",
            "TG_CHANNEL_4=$ch4",
            "TG_REPORT_CHANNEL=$env:TG_REPORT_CHANNEL",
            "MT5_LOGIN=$env:MT5_LOGIN",
            "MT5_PASSWORD=$env:MT5_PASSWORD",
            "MT5_SERVER=$env:MT5_SERVER",
            "MT5_PATH=$env:MT5_PATH",
            "LOT_TOTAL=$env:LOT_TOTAL",
            "ORDER_EXPIRY_MINUTES=240",
            "SLIPPAGE=20",
            "MAGIC_NUMBER=20250226",
            "TRAIL_POINTS=$env:TRAIL_POINTS",
            "DEMO_MODE=$env:DEMO_MODE",
            "NEWS_FILTER_ENABLED=$env:NEWS_FILTER_ENABLED",
            "NEWS_WINDOW_BEFORE_BLOCK=$nwBeforeBlock",
            "NEWS_WINDOW_BEFORE_CLOSE=$nwBeforeClose",
            "NEWS_WINDOW_AFTER=$nwAfter",
            "TIME_FILTER_ENABLED=false",
            "TIME_BLOCKED_WINDOWS=",
            "RUNTIME_MINUTES=$env:RUNTIME_MINUTES",
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY",
            "MAX_POSITIONS=$maxPositions",
            "MAX_SPREAD_POINTS=$maxSpread"
          )
          $lines | Set-Content -Path $envFile -Encoding UTF8
          Write-Host "Fichier .env cr\u00e9\u00e9"

          # ── Raccourci Bureau ──
          $desktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $wsh = New-Object -ComObject WScript.Shell
          $lnk = $wsh.CreateShortcut("$desktop\Lancer Bot Trading V4.lnk")
          $lnk.TargetPath = "powershell.exe"
          $lnk.Arguments = "-NoExit -ExecutionPolicy Bypass -Command `"cd C:\TradingBot; python telegram_listener.py`""
          $lnk.WorkingDirectory = $botDir
          $lnk.IconLocation = "powershell.exe"
          $lnk.Save()

          # ── R\u00e9sum\u00e9 ──
          Write-Host "========================================"
          Write-Host " TRADINGBOT V4 \u2014 PR\u00caT"
          Write-Host "========================================"
          Write-Host " IP RDP     : $env:TAILSCALE_IP"
          Write-Host " User RDP   : Gzl"
          Write-Host " Canaux     : $env:TG_CHANNELS"
          if ($env:TG_REPORT_CHANNEL) { Write-Host " Rapport    : $env:TG_REPORT_CHANNEL" }
          Write-Host " MT5        : $env:MT5_SERVER"
          Write-Host " Lot        : $env:LOT_TOTAL"
          Write-Host " Trail      : $env:TRAIL_POINTS pts"
          Write-Host " Demo Mode  : $env:DEMO_MODE"
          if ($env:SUPABASE_URL) { Write-Host " Supabase   : CONNECT\u00c9" }
          Write-Host "========================================"
          Write-Host " Sur le Bureau : double-cliquez"
          Write-Host " 'Lancer Bot Trading V4'"
          Write-Host "========================================"

      # ── V\u00e9rification avant d\u00e9marrage ──
      - name: Verify bot files
        run: |
          $botDir = "C:\TradingBot"
          $required = @("telegram_listener.py", "signal_parser.py", "supabase_logger.py", ".env")
          $ok = $true
          foreach ($f in $required) {
            $path = Join-Path $botDir $f
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              Write-Host "[OK] $f ($size bytes)"
            } else {
              Write-Error "[MISSING] MANQUANT: $f"
              $ok = $false
            }
          }
          if (-not $ok) {
            Write-Error "Fichiers critiques manquants \u2014 le bot va crasher!"
            exit 1
          }
          python -c "import sys; sys.path.insert(0, '$botDir'); from signal_parser import SignalParser; print('Import signal_parser OK')"

      # ── Start Bot (seulement si MT5 est install\u00e9) ──
      - name: Start TradingBot V4
        run: |
          $botDir = "C:\TradingBot"

          $mt5Exe = $env:MT5_PATH
          if (-not $mt5Exe -or -not (Test-Path $mt5Exe)) {
            $searchPaths = @(
              "${Env:PROGRAMFILES}\MetaTrader 5 EXNESS\terminal64.exe",
              "${Env:PROGRAMFILES}\MetaTrader 5\terminal64.exe",
              "${Env:PROGRAMFILES(x86)}\MetaTrader 5\terminal64.exe"
            )
            foreach ($p in $searchPaths) {
              if (Test-Path $p) { $mt5Exe = $p; break }
            }
            if (-not $mt5Exe) {
              $found = Get-ChildItem -Path "C:\Program Files" -Filter "terminal64.exe" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $mt5Exe = $found.FullName }
            }
          }

          if (-not $mt5Exe -or -not (Test-Path $mt5Exe)) {
            Write-Host "========================================"
            Write-Host " MT5 NON TROUV\u00c9"
            Write-Host "========================================"
            Write-Host "Installez MT5 manuellement via RDP"
            Write-Host "Puis lancez 'Lancer Bot Trading V4'"
            Write-Host "========================================"
            exit 0
          }

          Write-Host "MT5 trouv\u00e9: $mt5Exe"

          # Lancer MT5 avec auto-login si pas déjà lancé
          $mt5Process = Get-Process -Name "terminal64" -EA SilentlyContinue
          if (-not $mt5Process) {
            Write-Host "Demarrage de MT5 avec auto-login..."
            $mt5Dir = Split-Path $mt5Exe
            Start-Process -FilePath $mt5Exe -ArgumentList "/login:$env:MT5_LOGIN /password:$env:MT5_PASSWORD /server:$env:MT5_SERVER" -WorkingDirectory $mt5Dir
            Write-Host "MT5 demarre — attente 60s pour chargement complet + activation Algo Trading..."
            Start-Sleep -Seconds 60
            Write-Host "MT5 demarre"
          } else {
            Write-Host "MT5 deja en cours d'execution"
          }

          # Wrapper avec auto-restart en cas de crash
          $wrapperScript = @'
          $botDir = "C:\TradingBot"
          $maxRestarts = 10
          $restartCount = 0
          while ($restartCount -lt $maxRestarts) {
              Write-Host "=== Demarrage bot (tentative $($restartCount + 1)/$maxRestarts) ==="
              python "$botDir\telegram_listener.py" 2>&1
              $exitCode = $LASTEXITCODE
              Write-Host "Bot arrete avec code: $exitCode"
              if ($exitCode -eq 0) { break }
              $restartCount++
              if ($restartCount -lt $maxRestarts) {
                  Write-Host "Redemarrage dans 30s..."
                  Start-Sleep -Seconds 30
              }
          }
          '@
          $wrapperScript | Set-Content "C:\TradingBot\start_bot.ps1" -Encoding UTF8

          Write-Host "Demarrage du bot avec wrapper auto-retry..."
          Start-Process -FilePath "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -File C:\TradingBot\start_bot.ps1" -WorkingDirectory "C:\TradingBot" -RedirectStandardOutput "C:\TradingBot\bot_stdout.log" -RedirectStandardError "C:\TradingBot\bot_stderr.log" -NoNewWindow
          Start-Sleep -Seconds 10
          if (Test-Path "C:\TradingBot\bot_stdout.log") {
            $size = (Get-Item "C:\TradingBot\bot_stdout.log").Length
            Write-Host "Bot demarre [OK] - log: $size bytes"
          }
          if (Test-Path "C:\TradingBot\bot_stderr.log") {
            $errSize = (Get-Item "C:\TradingBot\bot_stderr.log").Length
            if ($errSize -gt 0) {
              Write-Host "ATTENTION - stderr ($errSize bytes):"
              Get-Content "C:\TradingBot\bot_stderr.log" -Tail 20
            }
          }

      # ── Keep Alive ──
      - name: Keep alive
        run: |
          $mins = [int]"$env:RUNTIME_MINUTES"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | ends " + $end.ToString("HH:mm:ss") + " | ip=$env:TAILSCALE_IP")
            Start-Sleep -Seconds 60
          }

      # ── Cleanup s\u00e9curit\u00e9: supprimer le fichier .env ──
      - name: Cleanup .env
        if: always()
        run: |
          $envFile = "C:\TradingBot\.env"
          if (Test-Path $envFile) {
            Remove-Item $envFile -Force
            Write-Host "Fichier .env supprim\u00e9 (cleanup s\u00e9curit\u00e9)"
          }

      # ── Dispatch next or stop ──
      - name: Dispatch next or stop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cycles = [int]"${{ inputs.cycles }}"
          if ($cycles -gt 0) {
            $next = $cycles - 1
            if ($next -le 0) {
              $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-stop.yml/dispatches"
              $hdr = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
              $body = @{
                ref = "${{ github.ref_name }}"
                inputs = @{
                  ts_tailnet = "${{ inputs.ts_tailnet }}"
                  ts_api_key = "${{ inputs.ts_api_key }}"
                  base_prefix = "gzl2"
                  max_count = "10"
                  dry_run = "false"
                }
              } | ConvertTo-Json -Depth 20
              Invoke-WebRequest -Method POST -Uri $url -Headers $hdr -Body $body | Out-Null
              Write-Host "Dispatched STOP."
            } else {
              $payload = @{
                ts_tailnet = "${{ inputs.ts_tailnet }}"
                ts_api_key = "${{ inputs.ts_api_key }}"
                ts_authkey = "${{ inputs.ts_authkey }}"
                quick_test = "${{ inputs.quick_test }}"
                runtime_minutes = "${{ inputs.runtime_minutes }}"
                cycles = "$next"
                rdp_count = "${{ inputs.rdp_count }}"
                crd_code = "${{ inputs.crd_code }}"
                bot_repo = "${{ inputs.bot_repo }}"
                tg_api_id = "${{ inputs.tg_api_id }}"
                tg_api_hash = "${{ inputs.tg_api_hash }}"
                tg_channels = "${{ inputs.tg_channels }}"
                tg_report_channel = "${{ inputs.tg_report_channel }}"
                mt5_login = "${{ inputs.mt5_login }}"
                mt5_password = "${{ inputs.mt5_password }}"
                mt5_server = "${{ inputs.mt5_server }}"
                lot_total = "${{ inputs.lot_total }}"
                trail_points = "${{ inputs.trail_points }}"
                demo_mode = "${{ inputs.demo_mode }}"
                news_filter_enabled = "${{ inputs.news_filter_enabled }}"
                news_windows = "${{ inputs.news_windows }}"
                supabase_url = "${{ inputs.supabase_url }}"
                supabase_anon_key = "${{ inputs.supabase_anon_key }}"
                risk_params = "${{ inputs.risk_params }}"
              }
              $url2 = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-rustdesk-B.yml/dispatches"
              $hdr2 = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
              $body2 = @{ ref = "${{ github.ref_name }}"; inputs = $payload } | ConvertTo-Json -Depth 20
              Invoke-WebRequest -Method POST -Uri $url2 -Headers $hdr2 -Body $body2 | Out-Null
              Write-Host "Dispatched Workflow B cycles=$next"
            }
          } else {
            Write-Host "Pas de cycle configur\u00e9. Termin\u00e9."
          }
